name: Release Binary

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: |
          bun build ./bin/run.ts --compile --target=bun-linux-x64 --outfile wtmg-linux-x64
          bun build ./bin/run.ts --compile --target=bun-darwin-x64 --outfile wtmg-darwin-x64
          bun build ./bin/run.ts --compile --target=bun-darwin-arm64 --outfile wtmg-darwin-arm64

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
